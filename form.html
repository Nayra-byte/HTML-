<!DOCTYPE html>
<html>
    <head>
        <title> Form </title>
    </head>
    <body>
        <h1>Personal Detail Form</h1>
        <form>
            <label>Name</label><br>
            <input type="text" id="name"><br><br>
            <label>Email ID</label><br>
            <input type="text" id="email"><br><br>
            <label>Contact Number</label><br>
            <input type="password" id="contact"><br><br>
            <label>Gender</label><br>
            <input type="radio" id="female" name="gender" value="Female">Female<br>
            <input type="radio" id="male" name="gender" value="Male">Male<br><br>
            <label>Favourite Food</label><br>
            <input type="checkbox" id="food" value="Tacos">Tacos<br>
            <input type="checkbox" id="food" value="Pasta">Pasta<br>
            <input type="submit">
        </form>
    </body>
</html>
